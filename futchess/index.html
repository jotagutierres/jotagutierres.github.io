document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

26,231,135,.25)}50%{box-shadow:0 0 40px rgba(126,231,135,.55)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%,#12331f 0%,#0a1f14 55%,#071710 100%);padding:0 0 70px\">\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-bottom:1px solid #16351f;position:sticky;top:0;z-index:30;background:rgba(8,26,17,.86);backdrop-filter:blur(10px)\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;cursor:pointer\" onclick=\"{{ goHome }}\">\n      <span style=\"font-family:'Anton',sans-serif;font-size:30px;letter-spacing:1px;line-height:.9;color:#f4fff0\">FUT<span style=\"color:#7ee787\">CHESS<\u002Fspan><\u002Fspan>\n      <span style=\"font-size:12px;color:#6f9a7c;text-transform:uppercase;letter-spacing:2.5px;font-weight:600\">AutoChess do Brasileirão<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <span style=\"font-size:12px;color:#5f8a6d;font-weight:600\">{{ phaseLabel }}<\u002Fspan>\n      <button onclick=\"{{ toggleSound }}\" title=\"Ligar/desligar som\" style=\"{{ soundStyle }}\">{{ soundIcon }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== REGISTRO ===== -->\n  <sc-if value=\"{{ regOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:70;background:rgba(4,14,9,.9);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px\">\n    <div style=\"width:100%;max-width:420px;background:#0c2317;border:1px solid #24492f;border-radius:18px;padding:28px 24px;text-align:center;animation:popIn .18s ease\">\n      <div style=\"font-family:'Anton',sans-serif;font-size:40px;color:#f4fff0;letter-spacing:1px\">FUT<span style=\"color:#7ee787\">CHESS<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:13px;color:#9dbaa5;margin:8px 0 20px\">Digite seu nome para entrar. Ele guarda seu <b style=\"color:#7ee787\">Elo<\u002Fb> e sua posição no ranking.<\u002Fdiv>\n      <input value=\"{{ regName }}\" oninput=\"{{ setRegName }}\" placeholder=\"Seu nome de jogador\" style=\"width:100%;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:13px 15px;border-radius:11px;font-size:16px;font-family:inherit;font-weight:600;text-align:center\">\n      <button onclick=\"{{ submitReg }}\" style=\"width:100%;margin-top:14px;font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:14px;border-radius:11px;cursor:pointer\">Entrar ▶<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== RANKING ===== -->\n  <sc-if value=\"{{ rankOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:65;background:rgba(4,14,9,.84);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px\" onclick=\"{{ closeRank }}\">\n    <div onclick=\"{{ stopProp }}\" style=\"width:100%;max-width:520px;max-height:88vh;overflow:auto;background:#0c2317;border:1px solid #24492f;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:popIn .18s ease\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1c4029;position:sticky;top:0;background:#0c2317\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;text-transform:uppercase;letter-spacing:.5px;color:#f2d349\">🏆 Ranking global<\u002Fdiv><button onclick=\"{{ closeRank }}\" style=\"background:none;border:none;color:#8fb69a;font-size:22px;cursor:pointer;line-height:1\">✕<\u002Fbutton><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:30px 1fr 60px 44px 44px;gap:6px;font-size:10px;color:#6f9a7c;text-transform:uppercase;letter-spacing:.5px;padding:8px 14px;border-bottom:1px solid #143024\"><span>#<\u002Fspan><span>Jogador<\u002Fspan><span style=\"text-align:center\">Elo<\u002Fspan><span style=\"text-align:center\">Camp.<\u002Fspan><span style=\"text-align:center\">🏆<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ rankRows }}\" as=\"r\" hint-placeholder-count=\"1\"><div style=\"{{ r.rowStyle }}\"><span style=\"font-family:'Anton',sans-serif;text-align:center;color:{{ r.posColor }}\">{{ r.pos }}<\u002Fspan><span style=\"font-weight:{{ r.me }};color:#eafff0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.name }}<\u002Fspan><span style=\"text-align:center;font-family:'Anton',sans-serif;color:#7ee787\">{{ r.elo }}<\u002Fspan><span style=\"text-align:center;color:#9dbaa5\">{{ r.played }}<\u002Fspan><span style=\"text-align:center;color:#f2d349\">{{ r.titles }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n      <sc-if value=\"{{ noProfiles }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"padding:22px;text-align:center;font-size:13px;color:#5f8a6d\">Nenhuma campanha registrada ainda. Jogue uma temporada pra pontuar!<\u002Fdiv><\u002Fsc-if>\n      <div style=\"padding:12px 16px;font-size:11px;color:#5f8a6d;border-top:1px solid #143024;text-align:center\">O ranking fica salvo neste navegador. Para ranking online entre dispositivos, precisa de um servidor no deploy.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== SALA ONLINE ===== -->\n  <sc-if value=\"{{ onlineOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:66;background:rgba(4,14,9,.86);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px\">\n    <div style=\"width:100%;max-width:520px;max-height:90vh;overflow:auto;background:#0c2317;border:1px solid #24492f;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:popIn .18s ease\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1c4029\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;text-transform:uppercase;letter-spacing:.5px;color:#5aa6ff\">🌐 Sala online<\u002Fdiv><button onclick=\"{{ closeOnline }}\" style=\"background:none;border:none;color:#8fb69a;font-size:22px;cursor:pointer;line-height:1\">✕<\u002Fbutton><\u002Fdiv>\n      <div style=\"padding:20px 22px 24px\">\n        <sc-if value=\"{{ netErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"background:rgba(224,122,122,.1);border:1px solid #5c2727;color:#ffb0b0;font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:14px\">{{ netErr }}<\u002Fdiv><\u002Fsc-if>\n\n        <sc-if value=\"{{ onConfig }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px\">Conectar Supabase (grátis)<\u002Fdiv>\n          <div style=\"font-size:13px;color:#9dbaa5;line-height:1.5;margin-bottom:12px\">No painel do <b style=\"color:#cfe6d5\">Supabase<\u002Fb>: <b style=\"color:#cfe6d5\">Settings → API<\u002Fb>. Copie a <b style=\"color:#7ee787\">Project URL<\u002Fb> e a chave <b style=\"color:#7ee787\">anon public<\u002Fb>.<\u002Fdiv>\n          <label style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Project URL<input value=\"{{ dbUrlV }}\" oninput=\"{{ onDbUrl }}\" placeholder=\"https://xxxx.supabase.co\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:14px;font-family:inherit\"><\u002Flabel>\n          <label style=\"display:block;margin-top:10px;font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Chave anon public<input value=\"{{ sbKeyV }}\" oninput=\"{{ onSbKey }}\" placeholder=\"eyJhbGci...\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:14px;font-family:inherit\"><\u002Flabel>\n          <div style=\"margin-top:14px;font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:5px\">1x: rode este SQL no Supabase (SQL Editor)<\u002Fdiv>\n          <pre style=\"background:#061109;border:1px solid #1c4029;border-radius:10px;padding:12px;font-size:11px;color:#a5f0ac;overflow:auto;white-space:pre;line-height:1.5;margin:0\">create table if not exists rooms (code text primary key, data jsonb, created timestamptz default now());\ncreate table if not exists ranking (name text primary key, elo int default 1000, played int default 0, titles int default 0, top4 int default 0, releg int default 0);\nalter table rooms enable row level security;\nalter table ranking enable row level security;\ncreate policy \"anon rooms\" on rooms for all to anon using (true) with check (true);\ncreate policy \"anon ranking\" on ranking for all to anon using (true) with check (true);<\u002Fpre>\n          <button onclick=\"{{ saveDb }}\" style=\"width:100%;margin-top:14px;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:13px;border-radius:11px;cursor:pointer\">Salvar e continuar ▶<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ onMenu }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <button onclick=\"{{ gotoCreate }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:16px;border-radius:12px;cursor:pointer\">Criar sala<\u002Fbutton>\n            <button onclick=\"{{ gotoJoin }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.5px;color:#5aa6ff;background:transparent;border:2px solid #2f4a6b;padding:14px;border-radius:12px;cursor:pointer\">Entrar em sala<\u002Fbutton>\n            <button onclick=\"{{ gotoConfigFromMenu }}\" style=\"background:none;border:none;color:#6f9a7c;font-size:12px;cursor:pointer;font-family:inherit;margin-top:2px\">Trocar servidor<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ onCreate }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <label style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Nome da sala<input value=\"{{ roomNameV }}\" oninput=\"{{ onRoomName }}\" placeholder=\"Pelada dos amigos\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:15px;font-family:inherit\"><\u002Flabel>\n            <label style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Senha (opcional)<input value=\"{{ roomPassV }}\" oninput=\"{{ onRoomPass }}\" placeholder=\"——\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:15px;font-family:inherit\"><\u002Flabel>\n            <label style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Seu time<input value=\"{{ roomTeamV }}\" oninput=\"{{ onRoomTeam }}\" placeholder=\"Nome do seu time\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:15px;font-family:inherit\"><\u002Flabel>\n            <div style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Formação<div style=\"display:flex;gap:8px;margin-top:6px\"><sc-for list=\"{{ roomFormOpts }}\" as=\"f\" hint-placeholder-count=\"3\"><button onclick=\"{{ f.pick }}\" style=\"{{ f.style }}\">{{ f.name }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Força das máquinas<div style=\"display:flex;gap:8px;margin-top:6px;flex-wrap:wrap\"><sc-for list=\"{{ roomDiffOpts }}\" as=\"d\" hint-placeholder-count=\"3\"><button onclick=\"{{ d.pick }}\" style=\"{{ d.style }}\">{{ d.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n            <button onclick=\"{{ createRoom }}\" style=\"margin-top:4px;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:14px;border-radius:11px;cursor:pointer\">Criar e abrir sala ▶<\u002Fbutton>\n            <button onclick=\"{{ gotoMenu }}\" style=\"background:none;border:none;color:#6f9a7c;font-size:13px;cursor:pointer;font-family:inherit\">Voltar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ onJoin }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <label style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Código da sala<input value=\"{{ joinCodeV }}\" oninput=\"{{ onJoinCode }}\" placeholder=\"Ex.: K7QP\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:15px;font-family:inherit;text-transform:uppercase\"><\u002Flabel>\n            <label style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Senha<input value=\"{{ joinPassV }}\" oninput=\"{{ onJoinPass }}\" placeholder=\"——\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:15px;font-family:inherit\"><\u002Flabel>\n            <label style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Seu time<input value=\"{{ roomTeamV }}\" oninput=\"{{ onRoomTeam }}\" placeholder=\"Nome do seu time\" style=\"display:block;width:100%;margin-top:6px;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:11px 13px;border-radius:10px;font-size:15px;font-family:inherit\"><\u002Flabel>\n            <button onclick=\"{{ joinRoom }}\" style=\"margin-top:4px;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:14px;border-radius:11px;cursor:pointer\">Entrar na sala ▶<\u002Fbutton>\n            <button onclick=\"{{ gotoMenu }}\" style=\"background:none;border:none;color:#6f9a7c;font-size:13px;cursor:pointer;font-family:inherit\">Voltar<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ onRoom }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;margin-bottom:14px\"><div style=\"font-size:12px;color:#7fa389;text-transform:uppercase;letter-spacing:1px\">{{ roomTitle }}<\u002Fdiv><div style=\"font-family:'Anton',sans-serif;font-size:34px;color:#7ee787;letter-spacing:3px\">{{ roomCode }}<\u002Fdiv><div style=\"font-size:12px;color:#9dbaa5\">Passe o código (e a senha) pros amigos entrarem<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px\">Na sala<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:16px\"><sc-for list=\"{{ roomPlayers }}\" as=\"p\" hint-placeholder-count=\"1\"><div style=\"display:flex;align-items:center;gap:9px;background:#08190f;border:1px solid #1c4029;border-radius:10px;padding:10px 13px\"><span style=\"font-weight:700;flex:1\">{{ p.name }}<\u002Fspan><span style=\"font-size:12px;color:#7fa389\">{{ p.formation }}<\u002Fspan><sc-if value=\"{{ p.host }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11px;color:#f2d349\">👑 host<\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n          <sc-if value=\"{{ roomIsHost }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ startRoomGame }}\" style=\"width:100%;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:14px;border-radius:11px;cursor:pointer\">Iniciar campeonato ▶<\u002Fbutton><\u002Fsc-if>\n          <sc-if value=\"{{ roomWaitGuest }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"text-align:center;font-size:13px;color:#9dbaa5;padding:8px\">⏳ Aguardando o host iniciar o campeonato…<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ roomStarted }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"text-align:center;font-size:13px;color:#7ee787;padding:8px\">🏁 Campeonato em andamento na tela do host. Seu Elo será atualizado no fim.<\u002Fdiv><\u002Fsc-if>\n          <button onclick=\"{{ leaveRoom }}\" style=\"width:100%;margin-top:10px;background:none;border:1px solid #2a5236;color:#9dbaa5;font-size:13px;cursor:pointer;font-family:inherit;padding:10px;border-radius:9px\">Sair da sala<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <div style=\"font-size:11px;color:#5f8a6d;margin-top:16px;text-align:center;line-height:1.4\">O campeonato roda na tela do host (todos veem o resultado). O ranking de Elo é compartilhado entre todos os aparelhos.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== LOBBY ===== -->\n  <sc-if value=\"{{ isLobby }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"max-width:1000px;margin:0 auto;padding:54px 26px 0\">\n    <div style=\"text-align:center;margin-bottom:38px\">\n      <div style=\"font-family:'Anton',sans-serif;font-size:clamp(52px,11vw,124px);line-height:.82;color:#f4fff0;letter-spacing:2px\">FUT<span style=\"color:#7ee787\">CHESS<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:clamp(13px,2.4vw,18px);color:#6f9a7c;text-transform:uppercase;letter-spacing:4px;font-weight:700;margin-top:8px\">AutoChess do Brasileirão<\u002Fdiv>\n      <p style=\"max-width:640px;margin:16px auto 0;font-size:19px;line-height:1.5;color:#bcd6c3\">Escolha 8 jogadores históricos, monte seu onze e deixe as <b style=\"color:#7ee787\">38 rodadas<\u002Fb> resolverem a conversa.<\u002Fp>\n      <div style=\"display:inline-flex;gap:7px;margin-top:18px;background:#0c2317;border:1px solid #1c4029;border-radius:11px;padding:7px\"><sc-for list=\"{{ showOvrOpts }}\" as=\"o\" hint-placeholder-count=\"2\"><button onclick=\"{{ o.pick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n      <div style=\"display:flex;gap:10px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;background:#0c2317;border:1px solid #1c4029;border-radius:11px;padding:8px 14px;font-size:14px;color:#cfe6d5\">👤 <b style=\"color:#7ee787\">{{ user }}<\u002Fb> · Elo <b style=\"font-family:'Anton',sans-serif\">{{ myElo }}<\u002Fb><\u002Fspan>\n        <button onclick=\"{{ openReg }}\" style=\"background:transparent;border:1px solid #2a5236;color:#9dbaa5;padding:8px 12px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit\">Trocar nome<\u002Fbutton>\n        <button onclick=\"{{ openRank }}\" style=\"background:transparent;border:1px solid #2f4a6b;color:#5aa6ff;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit\">🏆 Ranking global<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:44px\">\n      <button onclick=\"{{ startSolo }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.5px;text-transform:uppercase;color:#08210f;background:#7ee787;border:none;padding:16px 34px;border-radius:12px;cursor:pointer;box-shadow:0 8px 24px rgba(126,231,135,.28)\">Jogar solo ▶<\u002Fbutton>\n      <button onclick=\"{{ goSetup }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.5px;text-transform:uppercase;color:#e8f3ea;background:transparent;border:2px solid #2f5a3c;padding:14px 32px;border-radius:12px;cursor:pointer\">Passe e joga<\u002Fbutton>\n      <button onclick=\"{{ openOnline }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.5px;text-transform:uppercase;color:#5aa6ff;background:transparent;border:2px solid #2f4a6b;padding:14px 32px;border-radius:12px;cursor:pointer\">🌐 Sala online<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;max-width:960px;margin:0 auto\">\n      <div style=\"background:#0e2618;border:1px solid #1c4029;border-radius:14px;padding:20px\"><div style=\"font-family:'Anton',sans-serif;font-size:24px;color:#7ee787\">01<\u002Fdiv><div style=\"font-weight:700;margin:6px 0 4px\">Draft livre<\u002Fdiv><div style=\"font-size:13px;color:#9dbaa5;line-height:1.45\">A cada vez, 8 cartas na mesa. Pega quem quiser, some pra todos.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0e2618;border:1px solid #1c4029;border-radius:14px;padding:20px\"><div style=\"font-family:'Anton',sans-serif;font-size:24px;color:#7ee787\">02<\u002Fdiv><div style=\"font-weight:700;margin:6px 0 4px\">Perks estilo TFT<\u002Fdiv><div style=\"font-size:13px;color:#9dbaa5;line-height:1.45\">A cada 5 rodadas você ganha um perk pra turbinar o time.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0e2618;border:1px solid #1c4029;border-radius:14px;padding:20px\"><div style=\"font-family:'Anton',sans-serif;font-size:24px;color:#7ee787\">03<\u002Fdiv><div style=\"font-weight:700;margin:6px 0 4px\">Jogo ao vivo<\u002Fdiv><div style=\"font-size:13px;color:#9dbaa5;line-height:1.45\">Cronômetro rodando e timeline de gols, com estatísticas de todos.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== SETUP ===== -->\n  <sc-if value=\"{{ isSetup }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"max-width:780px;margin:0 auto;padding:34px 24px 0\">\n    <div style=\"font-size:12px;color:#6f9a7c;text-transform:uppercase;letter-spacing:2px;font-weight:600\">Multiplayer · mesmo aparelho<\u002Fdiv>\n    <div style=\"font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;margin-bottom:20px\">Quem vai jogar?<\u002Fdiv>\n\n    <div style=\"margin-bottom:20px\"><div style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:7px\">Jogadores humanos (máx. 20)<\u002Fdiv>\n      <div style=\"display:flex;gap:6px;flex-wrap:wrap\"><sc-for list=\"{{ humanOpts }}\" as=\"o\" hint-placeholder-count=\"20\"><button onclick=\"{{ o.pick }}\" style=\"{{ o.style }}\">{{ o.n }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n\n    <div style=\"margin-bottom:22px\"><div style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:7px\">Força das máquinas<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap\"><sc-for list=\"{{ diffOpts }}\" as=\"d\" hint-placeholder-count=\"3\"><button onclick=\"{{ d.pick }}\" style=\"{{ d.style }}\">{{ d.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n\n    <div style=\"margin-bottom:22px\"><div style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:7px\">Overall dos jogadores<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap\"><sc-for list=\"{{ showOvrOpts }}\" as=\"o\" hint-placeholder-count=\"2\"><button onclick=\"{{ o.pick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:20px;max-height:340px;overflow:auto\">\n      <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"2\">\n        <div style=\"display:flex;gap:10px;align-items:center;background:#0c2317;border:1px solid #1c4029;border-radius:12px;padding:11px 13px\">\n          <span style=\"width:28px;height:28px;border-radius:8px;background:{{ r.color }};flex:none\"><\u002Fspan>\n          <input value=\"{{ r.name }}\" oninput=\"{{ r.onName }}\" style=\"flex:1;min-width:0;background:#08190f;border:1px solid #2a5236;color:#eafff0;padding:9px 11px;border-radius:9px;font-size:14px;font-family:inherit;font-weight:600\">\n          <div style=\"display:flex;gap:5px\"><sc-for list=\"{{ r.forms }}\" as=\"f\" hint-placeholder-count=\"3\"><button onclick=\"{{ f.pick }}\" style=\"{{ f.style }}\">{{ f.name }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-size:13px;color:#7fa389;margin-bottom:20px\"><b style=\"color:#cfe6d5\">{{ humanCount }}<\u002Fb> humanos draftam · <b style=\"color:#cfe6d5\">{{ cpuFill }}<\u002Fb> máquinas ({{ diffLabel }}) completam os 20 times.<\u002Fdiv>\n    <div style=\"display:flex;gap:12px\">\n      <button onclick=\"{{ drawOrder }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:15px 30px;border-radius:11px;cursor:pointer\">Sortear ordem 🎲<\u002Fbutton>\n      <button onclick=\"{{ goHome }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.5px;color:#9dbaa5;background:transparent;border:2px solid #2a5236;padding:13px 24px;border-radius:11px;cursor:pointer\">Voltar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== ORDER ===== -->\n  <sc-if value=\"{{ isOrder }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"max-width:620px;margin:0 auto;padding:46px 24px 0;text-align:center\">\n    <div style=\"font-size:12px;color:#6f9a7c;text-transform:uppercase;letter-spacing:2px;font-weight:600\">Sorteio do dado<\u002Fdiv>\n    <div style=\"font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;margin-bottom:24px\">Ordem do snake draft<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:28px;max-height:420px;overflow:auto\">\n      <sc-for list=\"{{ orderList }}\" as=\"o\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;align-items:center;gap:14px;background:#0c2317;border:1px solid #1c4029;border-radius:12px;padding:13px 18px;animation:rise .4s ease {{ o.delay }} both\">\n          <span style=\"font-family:'Anton',sans-serif;font-size:26px;color:#7ee787;width:34px\">{{ o.pos }}<\u002Fspan>\n          <span style=\"width:28px;height:28px;border-radius:7px;background:{{ o.color }}\"><\u002Fspan>\n          <span style=\"flex:1;text-align:left;font-weight:700;font-size:16px\">{{ o.name }}<\u002Fspan>\n          <span style=\"font-size:12px;color:#7fa389\">👤 humano<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font-size:13px;color:#7fa389;margin-bottom:18px\">Vai e volta a cada rodada de pick (1→N, N→1) pra equilibrar.<\u002Fdiv>\n    <button onclick=\"{{ startDraft }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;text-transform:uppercase;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:16px 38px;border-radius:12px;cursor:pointer\">Começar draft ▶<\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== DRAFT ===== -->\n  <sc-if value=\"{{ isDraft }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"max-width:1160px;margin:0 auto;padding:22px 22px 0\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <span style=\"width:42px;height:42px;border-radius:10px;background:{{ turnColor }};display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:18px;color:#fff\">{{ turnInitial }}<\u002Fspan>\n        <div>\n          <div style=\"font-size:12px;color:#6f9a7c;text-transform:uppercase;letter-spacing:2px;font-weight:600\">Escolha {{ turnPickNo }} de 11 · rodada {{ snakeRound }}/11<\u002Fdiv>\n          <div style=\"font-family:'Oswald',sans-serif;font-size:24px;font-weight:600\">Vez de <span style=\"color:#7ee787\">{{ turnName }}<\u002Fspan> — pegue 1 carta<\u002Fdiv>\n          <sc-if value=\"{{ onlineMyTurn }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#7ee787;font-weight:700;margin-top:2px\">🟢 Sua vez! Escolha uma carta.<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ onlineWaiting }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#e0a34a;font-weight:600;margin-top:2px\">⏳ Aguardando {{ turnName }} escolher…<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <span style=\"font-size:13px;color:#7fa389\">{{ poolLeft }} no pool<\u002Fspan>\n        <span style=\"font-size:13px;color:#cfe6d5\">{{ swapsLeft }} trocas<\u002Fspan>\n        <button onclick=\"{{ swapSquad }}\" disabled=\"{{ swapDisabled }}\" style=\"{{ swapBtnStyle }}\">↻ Trocar cartas<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:5px;margin-bottom:8px\"><sc-for list=\"{{ progressDots }}\" as=\"d\" hint-placeholder-count=\"11\"><div style=\"{{ d.style }}\"><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n    <div style=\"font-size:12px;color:#7fa389;margin-bottom:18px\">Ainda faltam: <b style=\"color:#cfe6d5\">{{ openNeeds }}<\u002Fb><\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 290px;gap:22px;align-items:start\">\n      <div>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px\">\n          <sc-for list=\"{{ offered }}\" as=\"p\" hint-placeholder-count=\"8\">\n            <button onclick=\"{{ p.pick }}\" style=\"{{ p.cardStyle }}\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n                <span style=\"font-size:11px;font-weight:700;letter-spacing:1px;color:{{ p.posColor }};background:rgba(255,255,255,.06);padding:2px 7px;border-radius:6px\">{{ p.pos }}<\u002Fspan>\n                <span style=\"font-family:'Anton',sans-serif;font-size:24px;line-height:.9;color:{{ p.ovrColor }}\">{{ p.ovrText }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"margin-top:auto;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;text-align:left;line-height:1.05;color:#ffffff\">{{ p.name }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:#7fa389;text-align:left\">{{ p.tag }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0c2317;border:1px solid #1c4029;border-radius:14px;padding:16px;position:sticky;top:82px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px\">{{ turnName }}<\u002Fdiv><div style=\"font-size:12px;color:#7fa389\">{{ turnFormation }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px\"><sc-for list=\"{{ teamList }}\" as=\"s\" hint-placeholder-count=\"11\"><button onclick=\"{{ s.click }}\" style=\"{{ s.rowStyle }}\"><span style=\"font-size:10px;font-weight:700;color:{{ s.labelColor }};width:30px\">{{ s.label }}<\u002Fspan><span style=\"flex:1;font-size:13px;font-weight:600;color:{{ s.nameColor }}\">{{ s.name }}<\u002Fspan><span style=\"font-family:'Anton',sans-serif;font-size:14px;color:{{ s.ovrColor }}\">{{ s.ovr }}<\u002Fspan><\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n        <div style=\"font-size:11px;color:#5f8a6d;margin-top:8px;line-height:1.35\">🔀 Toque num jogador e depois num slot para reposicionar (posições compatíveis).<\u002Fdiv>\n        <sc-if value=\"{{ hasSynergy }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:10px;padding-top:10px;border-top:1px solid #1c4029\"><div style=\"font-size:11px;color:#7fa389;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:5px\">🔗 Sinergia<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:3px\"><sc-for list=\"{{ synergyList }}\" as=\"g\" hint-placeholder-count=\"1\"><div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#cfe6d5\">{{ g.from }}<\u002Fspan><span style=\"color:#7ee787;font-weight:700\">{{ g.bonus }}<\u002Fspan><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"margin-top:12px;padding-top:12px;border-top:1px solid #1c4029;display:flex;justify-content:space-between;align-items:center\"><span style=\"font-size:12px;color:#7fa389;text-transform:uppercase;letter-spacing:1px\">Overall<\u002Fspan><span style=\"font-family:'Anton',sans-serif;font-size:24px;color:#f4fff0\">{{ turnOvr }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== LINEUP ===== -->\n  <sc-if value=\"{{ isLineup }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"max-width:900px;margin:0 auto;padding:24px 22px 0\">\n    <div style=\"text-align:center;margin-bottom:16px\"><div style=\"font-size:12px;color:#6f9a7c;text-transform:uppercase;letter-spacing:2px;font-weight:600\">Escalações prontas<\u002Fdiv><div style=\"font-family:'Oswald',sans-serif;font-size:28px;font-weight:700\">{{ featName }} <span style=\"color:#7ee787\">· {{ featFormation }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <sc-if value=\"{{ manyDrafters }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;gap:7px;justify-c ;color:#9dbaa5\">base <b style=\"color:#cfe6d5\">{{ ovrBase }}<\u002Fb> · sinergia <b style=\"color:#7ee787\">{{ ovrSynTxt }}<\u002Fb> · perks <b style=\"color:#7ee787\">{{ ovrPerkTxt }}<\u002Fb><sc-if value=\"{{ showEvt }}\" hint-placeholder-val=\"{{ false }}\"> · eventos <b style=\"color:#e0a34a\">{{ ovrEvtTxt }}<\u002Fb><\u002Fsc-if><\u002Fspan>\n      <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-left:auto\"><sc-for list=\"{{ ovrConds }}\" as=\"c\" hint-placeholder-count=\"0\"><span style=\"font-size:11px;font-weight:600;color:#cfe6d5;background:rgba(255,255,255,.05);border:1px solid #2a5236;padding:3px 8px;border-radius:20px\">{{ c.t }}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <!-- perks HUD -->\n    <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#0c2317;border:1px solid #1c4029;border-radius:12px;padding:11px 14px;margin-bottom:16px\">\n      <sc-if value=\"{{ manyDrafters }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-right:6px\"><sc-for list=\"{{ featTabs }}\" as=\"t\" hint-placeholder-count=\"3\"><button onclick=\"{{ t.pick }}\" style=\"{{ t.styleSm }}\">{{ t.name }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fsc-if>\n      <span style=\"font-size:12px;color:#7fa389;text-transform:uppercase;letter-spacing:1px;font-weight:600\">Perks de {{ featName }}:<\u002Fspan>\n      <sc-for list=\"{{ featPerks }}\" as=\"p\" hint-placeholder-count=\"1\"><span style=\"display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid #2a5236;padding:4px 9px;border-radius:20px;font-size:12px;font-weight:600;color:{{ p.color }}\">{{ p.icon }} {{ p.name }}<\u002Fspan><\u002Fsc-for>\n      <sc-if value=\"{{ noPerks }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;color:#5f8a6d\">nenhum ainda — chega na rodada 5<\u002Fspan><\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- LIVE MATCH + MINI PITCH -->\n lex;flex-direction:column;gap:6px;margin-top:12px;min-height:44px\">\n        <sc-for list=\"{{ liveEvents }}\" as=\"e\" hint-placeholder-count=\"0\">\n          <div style=\"display:flex;align-items:center;gap:10px;animation:evIn .25s ease;{{ e.align }}\">\n            <span style=\"font-family:'Anton',sans-serif;font-size:13px;color:#e0a34a;width:34px;text-align:{{ e.minAlign }}\">{{ e.min }}<\u002Fspan>\n            <span style=\"font-size:14px;color:#eafff0\">⚽ {{ e.name }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noEventsYet }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:13px;color:#5f8a6d;text-align:center\">{{ emptyMsg }}<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- mini pitch: nosso time -->\n    <div style=\"background:#0c2317;border:1px solid #1c4029;border-radius:16px;padding:10px;display:flex;flex-direction:column\">\n      <div style=\"font-size:10px;color:#7fa389;text-transform:uppercase;letter-spacing:1px;font-weight:700;text-align:center;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ featName }}<\u002Fdiv>\n      <div style=\"position:relative;flex:1;min-height:230px;border-radius:10px;overflow:hidden;background:repeating-linear-gradient(#164d2b 0 26px,#12421f 26px 52px);border:1px solid #2a6b3d\">\n        <div style=\"position:absolute;inset:6px;border:1px solid rgba(255,255,255,.22);border-radius:5px\"><\u002Fdiv>\n        <div style=\"position:absolute;left:6px;right:6px;top:50%;height:1px;background:rgba(255,255,255,.22)\"><\u002Fdiv>\n        <sc-for list=\"{{ pitch }}\" as=\"p\" hint-placeholder-count=\"11\"><div style=\"{{ p.miniStyle }}\"><div style=\"{{ p.miniRing }}\">{{ p.ovr }}<\u002Fdiv><div style=\"font-size:8px;font-weight:700;color:#cfe6d5;margin-top:1px;white-space:nowrap;max-width:56px;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px #000\">{{ p.name }}<\u002Fdiv><\u002Fdiv><\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1.15fr;gap:20px;align-items:start\">\n      <div style=\"display:flex;flex-direction:column;gap:18px\">\n      <!-- confrontos entre jogadores -->\n      <sc-if value=\"{{ hasClashPanel }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#0c2317;border:1px solid #2f6b40;border-radius:14px;overflow:hidden\">\n        <div style=\"padding:13px 16px;font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1c4029;color:#7ee787\">👥 Confrontos entre jogadores · rodada {{ fixturesRound }}<\u002Fdiv>\n        <sc-for list=\"{{ clashes }}\" as=\"c\" hint-placeholder-count=\"1\">\n          <div style=\"display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #10281a\">\n            <span style=\"width:12px;height:12px;border-radius:4px;background:{{ c.homeColor }};flex:none\"><\u002Fspan>\n            <span style=\"flex:1;text-align:right;font-size:13px;font-weight:{{ c.hw }};color:#eafff0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.home }}<\u002Fspan>\n            <span style=\"font-family:'Oswald',sans-serif;font-weight:700;color:#f4fff0;min-width:52px;text-align:center\">{{ c.score }}<\u002Fspan>\n            <span style=\"flex:1;font-size:13px;font-weight:{{ c.aw }};color:#eafff0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.away }}<\u002Fspan>\n            <span style=\"width:12px;height:12px;border-radius:4px;background:{{ c.awayColor }};flex:none\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noClash }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"padding:14px;text-align:center;font-size:12px;color:#5f8a6d\">Sem confronto direto entre jogadores nesta rodada — eles se enfrentam em outras rodadas (todos jogam contra todos, ida e volta).<\u002Fdiv><\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <!-- other fixtures -->\n      <div style=\"background:#0c2317;border:1px solid #1c4029;border-radius:14px;overflow:hidden\">\n        <div style=\"padding:13px 16px;font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1c4029\">Outros jogos · rodada {{ fixturesRound }}<\u002Fdiv>\n        <sc-for list=\"{{ fixtures }}\" as=\"g\" hint-placeholder-count=\"9\">\n          <div style=\"{{ g.rowStyle }}\"><span style=\"flex:1;text-align:right;font-size:13px;font-weight:{{ g.hw }};color:{{ g.hc }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ g.home }}<\u002Fspan><span style=\"font-family:'Oswald',sans-serif;font-weight:700;color:#f4fff0;min-width:52px;text-align:center\">{{ g.score }}<\u002Fspan><span style=\"flex:1;font-size:13px;font-weight:{{ g.aw }};color:{{ g.ac }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ g.away }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noFixtures }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"padding:18px;text-align:center;font-size:13px;color:#5f8a6d\">A primeira rodada começa quando você mandar bola.<\u002Fdiv><\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- table + scorers -->\n      <div style=\"display:flex;flex-direction:column;gap:18px\">\n        <div style=\"background:#0c2317;border:1px solid #1c4029;border-radius:14px;overflow:hidden\">\n          <div style=\"padding:13px 16px;font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1c4029\">Tabela<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:26px 1fr 34px 30px 40px;font-size:11px;color:#6f9a7c;text-transform:uppercase;padding:7px 14px;border-bottom:1px solid #143024\"><span>#<\u002Fspan><span>Clube<\u002Fspan><span style=\"text-align:center\">Pts<\u002Fspan><span style=\"text-align:center\">J<\u002Fspan><span style=\"text-align:center\">SG<\u002Fspan><\u002Fdiv>\n          <div style=\"max-height:440px;overflow:auto\"><sc-for list=\"{{ standings }}\" as=\"t\" hint-placeholder-count=\"20\"><div style=\"{{ t.rowStyle }}\"><span style=\"{{ t.posStyle }}\">{{ t.pos }}<\u002Fspan><span style=\"display:flex;align-items:center;gap:7px;min-width:0\"><span style=\"{{ t.crest }}\">{{ t.abbr }}<\u002Fspan><span style=\"font-weight:{{ t.weight }};color:{{ t.nameColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ t.name }}<\u002Fspan><\u002Fspan><span style=\"text-align:center;font-family:'Anton',sans-serif;color:#f4fff0\">{{ t.pts }}<\u002Fspan><span style=\"text-align:center;color:#9dbaa5\">{{ t.pj }}<\u002Fspan><span style=\"text-align:center;color:{{ t.sgColor }}\">{{ t.sg }}<\u002Fspan><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#0c2317;border:1px solid #1c4029;border-radius:14px;overflow:hidden\">\n          <div style=\"padding:13px 16px;font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1c4029\">Artilharia<\u002Fdiv>\n          <sc-for list=\"{{ scorers }}\" as=\"s\" hint-placeholder-count=\"6\"><div style=\"{{ s.rowStyle }}\"><span style=\"width:20px;color:#6f9a7c;font-size:12px\">{{ s.pos }}<\u002Fspan><span style=\"flex:1;font-weight:{{ s.weight }};color:{{ s.nameColor }};font-size:14px\">{{ s.name }}<\u002Fspan><span style=\"font-size:11px;color:#7fa389\">{{ s.club }}<\u002Fspan><span style=\"font-family:'Anton',sans-serif;color:#7ee787;width:26px;text-align:right\">{{ s.goals }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DETAILED STATS (all players) -->\n    <div style=\"background:#0c2317;border:1px solid #1c4029;border-radius:14px;overflow:hidden;margin-top:18px\">\n      <div style=\"padding:13px 16px;font-family:'Oswald',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1c4029\">Estatísticas detalhadas · todos os jogadores<\u002Fdiv>\n      <div style=\"overflow:auto\"><div style=\"min-width:720px\">\n        <div style=\"display:grid;grid-template-columns:24px 1.4fr 40px 34px 34px 34px 40px 40px 44px 62px 1.1fr 96px;font-size:10px;color:#6f9a7c;text-transform:uppercase;letter-spacing:.5px;padding:8px 14px;border-bottom:1px solid #143024;gap:4px\">\n          <span>#<\u002Fspan><span>Jogador<\u002Fspan><span style=\"text-align:center\">Pts<\u002Fspan><span style=\"text-align:center\">V<\u002Fspan><span style=\"text-align:center\">E<\u002Fspan><span style=\"text-align:center\">D<\u002Fspan><span style=\"text-align:center\">GP<\u002Fspan><span style=\"text-align:center\">GC<\u002Fspan><span style=\"text-align:center\">Apr.<\u002Fspan><span>Artilheiro<\u002Fspan><span><\u002Fspan><span style=\"text-align:center\">Forma<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ detailed }}\" as=\"d\" hint-placeholder-count=\"2\">\n          <div style=\"{{ d.rowStyle }}\">\n            <span style=\"font-family:'Anton',sans-serif;color:{{ d.posColor }};text-align:center\">{{ d.pos }}<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px;min-width:0\"><span style=\"{{ d.crest }}\">{{ d.abbr }}<\u002Fspan><span style=\"font-weight:700;color:{{ d.nameColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ d.name }}<\u002Fspan><\u002Fspan>\n            <span style=\"text-align:center;font-family:'Anton',sans-serif;color:#f4fff0\">{{ d.pts }}<\u002Fspan>\n            <span style=\"text-align:center;color:#9dbaa5\">{{ d.w }}<\u002Fspan><span style=\"text-align:center;color:#9dbaa5\">{{ d.e }}<\u002Fspan><span style=\"text-align:center;color:#9dbaa5\">{{ d.l }}<\u002Fspan>\n            <span style=\"text-align:center;color:#9dbaa5\">{{ d.gp }}<\u002Fspan><span style=\"text-align:center;color:#9dbaa5\">{{ d.gc }}<\u002Fspan>\n            <span style=\"text-align:center;color:{{ d.aprColor }};font-weight:600\">{{ d.apr }}<\u002Fspan>\n            <span style=\"font-size:12px;color:#cfe6d5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ d.topName }}<\u002Fspan>\n            <span style=\"font-size:11px;color:#7fa389\">{{ d.topGoals }}<\u002Fspan>\n            <span style=\"display:flex;gap:3px;justify-content:center\"><sc-for list=\"{{ d.form }}\" as=\"f\" hint-placeholder-count=\"5\"><span style=\"width:15px;height:15px;border-radius:4px;background:{{ f.bg }};color:{{ f.fg }};font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center\">{{ f.c }}<\u002Fspan><\u002Fsc-for><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== PERK WINDOW ===== -->\n  <sc-if value=\"{{ perkOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:60;background:rgba(4,14,9,.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px\">\n    <div style=\"width:100%;max-width:820px;animation:popIn .2s ease\">\n      <div style=\"text-align:center;margin-bottom:22px\">\n        <div style=\"font-size:12px;color:#e0a34a;text-transform:uppercase;letter-spacing:2px;font-weight:700\">Janela de perk · rodada {{ perkRound }}<\u002Fdiv>\n        <div style=\"font-family:'Oswald',sans-serif;font-size:30px;font-weight:700\"><span style=\"color:#7ee787\">{{ perkFor }}<\u002Fspan>, escolha 1 perk<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9dbaa5;margin-top:4px\">{{ perkQueueNote }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n        <sc-for list=\"{{ perkOffers }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ p.choose }}\" style=\"display:flex;flex-direction:column;gap:10px;text-align:left;padding:20px;border-radius:16px;cursor:pointer;font-family:inherit;background:{{ p.bg }};border:2px solid {{ p.border }};min-height:200px;animation:glow 2.4s infinite\">\n            <div style=\"font-size:34px\">{{ p.icon }}<\u002Fdiv>\n            <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:19px;color:{{ p.color }}\">{{ p.name }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#bcd6c3;line-height:1.4\">{{ p.desc }}<\u002Fdiv>\n            <div style=\"margin-top:auto;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:{{ p.color }}\">{{ p.tierLabel }}<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EVENTS (random news) ===== -->\n  <sc-if value=\"{{ eventOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:60;background:rgba(4,14,9,.84);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px\">\n    <div style=\"width:100%;max-width:580px;max-height:88vh;overflow:auto;background:#0c2317;border:1px solid #24492f;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:popIn .18s ease\">\n      <div style=\"padding:18px 22px;border-bottom:1px solid #1c4029\"><div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;text-transform:uppercase;letter-spacing:.5px;color:#e0a34a\">📰 Notícias do campeonato<\u002Fdiv><div style=\"font-size:12px;color:#9dbaa5;margin-top:2px\">Acontecimentos que mexem com os times nesta altura da temporada.<\u002Fdiv><\u002Fdiv>\n      <div style=\"padding:18px 20px;display:flex;flex-direction:column;gap:10px\">\n        <sc-for list=\"{{ eventNews }}\" as=\"n\" hint-placeholder-count=\"1\">\n          <div style=\"{{ n.rowStyle }}\">\n            <span style=\"font-size:26px\">{{ n.icon }}<\u002Fspan>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"{{ n.crest }}\">{{ n.abbr }}<\u002Fspan><span style=\"font-weight:700;font-size:14px;color:#eafff0\">{{ n.team }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;color:{{ n.color }};margin-top:2px\">{{ n.title }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#9dbaa5\">{{ n.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-family:'Anton',sans-serif;font-size:15px;color:{{ n.color }};white-space:nowrap\">{{ n.mod }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <button onclick=\"{{ closeEvents }}\" style=\"margin-top:6px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;font-size:15px;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:13px;border-radius:11px;cursor:pointer\">Continuar ▶<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TRADE (player to player) ===== -->\n  <sc-if value=\"{{ tradeOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:60;background:rgba(4,14,9,.84);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px\">\n    <div style=\"width:100%;max-width:720px;max-height:90vh;overflow:auto;background:#0c2317;border:1px solid #24492f;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:popIn .18s ease\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1c4029;position:sticky;top:0;background:#0c2317;z-index:2\">\n        <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;text-transform:uppercase;letter-spacing:.5px;color:#5aa6ff\">🔁 Trocas entre jogadores<\u002Fdiv>\n        <button onclick=\"{{ closeTrade }}\" style=\"background:none;border:none;color:#8fb69a;font-size:22px;cursor:pointer;line-height:1\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"padding:20px 22px 24px\">\n\n        <sc-if value=\"{{ isHub }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"font-size:13px;color:#9dbaa5;margin-bottom:14px\">Cada jogador pode propor <b style=\"color:#cfe6d5\">uma troca<\u002Fb>. O outro pode aceitar, recusar ou fazer contraproposta.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ tradeHub }}\" as=\"h\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;align-items:center;gap:10px;background:#08190f;border:1px solid #1c4029;border-radius:11px;padding:12px 14px\">\n                <span style=\"width:20px;height:20px;border-radius:6px;background:{{ h.color }}\"><\u002Fspan>\n                <span style=\"flex:1;font-weight:700\">{{ h.name }}<\u002Fspan>\n                <sc-if value=\"{{ h.canPropose }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ h.propose }}\" style=\"font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;font-size:13px;letter-spacing:.5px;color:#08210f;background:#7ee787;border:none;padding:9px 18px;border-radius:9px;cursor:pointer\">Propor troca<\u002Fbutton><\u002Fsc-if>\n                <sc-if value=\"{{ h.used }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:12px;color:#5f8a6d\">já usou a troca<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isCompose }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;margin-bottom:14px\"><span style=\"color:#7ee787\">{{ proposerName }}<\u002Fspan> propõe<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8fb69a;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px\">1 · Você oferece<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(120
