  <script type="text/babel" src="../src/case-study.jsx"></script>
  <script type="text/babel">
    const data = {
      client: "Silvio Santos Group",
      role: "Senior Product Designer",
      year: "2024 — 2025",
      scope: "Design system · Web platform",
      title: <>Tele Sena — a <span className="serif">system</span> rebuilt.</>,
      lead: <>A full restructure of the design system powering one of Brazil's most iconic capitalization bond platforms — results, redemptions, purchases, all in one place.</>,
      cover: "https://framerusercontent.com/images/6eWjjIG48XJday0WL9mYH9Yg5Hw.jpg",

      context: [
        "Tele Sena is a Brazilian institution — a single-payment capitalization bond introduced in November 1991 by the Silvio Santos Group. Millions of people use it to check results, redeem prizes and compete for weekly draws.",
        "<span class='muted'>By 2024, the platform had grown organically for over three decades. Components were duplicated, behaviours were inconsistent across flows, and shipping anything new meant re-solving problems that had already been solved somewhere else in the product.</span>",
      ],
      challenge: [
        "Design systems are never \"just\" a visual refresh. This one had to absorb years of edge cases — legal copy, accessibility requirements, high-trust financial flows — without throwing away the familiarity that long-time users depend on.",
        "I was brought in to lead the restructure: audit what existed, define the foundation, rebuild the components, and hand off a system the internal team could evolve without me.",
      ],
      gallery1: null,

      approachTitle: <>Audit, <span className="serif">foundation,</span> scale.</>,
      approach: [
        "Phase one was archaeological. I inventoried every screen in the product, every component in Figma, every variant in production — 400+ artefacts — and sorted them into what stays, what merges and what dies.",
        "Phase two was foundation work: a token layer (colour, spacing, type, elevation, motion) that every component would reference. No more hex codes in components; no more magic numbers in padding.",
        "<span class='muted'>Phase three was the build — atomic components first, then patterns, then full page templates. Every component shipped with documentation, usage rules and do/don't examples. The system became a product of its own.</span>",
      ],
      decisions: [
        "<strong>Tokenised everything</strong>: colour, type, spacing, radius, elevation — no raw values allowed in components.",
        "<strong>One source of truth</strong>: Figma library mirrors production. A change in one updates the other; deprecated components get a visible flag.",
        "<strong>Accessibility baked in</strong>: every component ships with contrast, focus, keyboard and screen-reader specs — not as a later audit, as a gate on publish.",
        "<strong>Documentation as code</strong>: usage rules live beside each component, not in a separate deck that nobody opens.",
      ],
      wideLabel: null,

      outcome: [
        "The restructured system became the foundation for Tele Sena's platform going forward. Shipping speed went up because the team stopped re-designing the same button, and the product started to feel like one product again, from purchase through redemption.",
      ],
      metrics: [
        { n: "400<span class='serif'>+</span>", l: "Artefacts audited" },
        { n: "1<span class='serif'>×</span>", l: "Source of truth" },
        { n: "+55<span class='serif'>%</span>", l: "Shipping speed" },
        { n: "WCAG<span class='serif'> AA</span>", l: "Baseline contrast" },
      ],
      reflection: [
        "A design system is a negotiation. Every component is a compromise between the designer who wants control, the developer who wants consistency, and the product manager who wants speed. The system wins when all three feel like they got what they came for.",
        "<span class='muted'>The biggest lesson: documentation isn't a nice-to-have. It's 50% of the product. Without it, you don't have a system — you have a collection.</span>",
      ],
      next: { name: <>Ranger <span className="serif">Scroll Drive</span></>, idx: "05 / 05", href: "ranger.html" },
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CaseStudyPage data={data} />);
  </script>
